# pytest.ini
[pytest]
addopts = -v -s
testpaths = tests
pythonpath = src
filterwarnings =
    ignore:numpy.character size changed, may indicate binary incompatibility:RuntimeWarning
    ignore:Importing 'parser.split_arg_string' is deprecated:DeprecationWarning
    ignore:Deprecated API features detected!:UserWarning
    ignore:invalid value encountered in scalar divide:RuntimeWarning
    ignore:.*SQLAlchemy 2.0.*:sqlalchemy.exc.SAWarning
    ignore:.*SQLAlchemy 2.0.*:sqlalchemy.exc.MovedIn20Warning
