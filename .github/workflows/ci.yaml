name: ci

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      run_integration:
        description: Run integration tests (requires external services)
        type: boolean
        default: false
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    runs-on: ubuntu-latest
    env:
      NL_INTEGRATION: "0" # skips tests that require integration
      NL_SKIP_LLM: "1" # skips any calls to LLM
      OPENAI_API_KEY: "sk-test" # fake key for completeness
      WANDB_API_KEY: "test" # fake key for completeness
      DATABRICKS_HOST: "https://workspace.test" # fake key for completeness
      DATABRICKS_CLIENT_ID: "client-id" # fake key for completeness
      DATABRICKS_CLIENT_SECRET: "client-secret" # fake key for completeness
      DATABRICKS_WAREHOUSE_ID: "wh" # fake key for completeness
      DATABRICKS_OAUTH_ACCESS_TOKEN: "test" # fake key for completeness
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          cache: true
      - name: Run unit tests (no external services) # command to run external services
        run: >
          pixi run -e dev pytest -m "not integration"
          -k "not enrich_zip_segment"

  integration:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_integration }}
    runs-on: ubuntu-latest
    env:
      NL_INTEGRATION: "1"
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_WAREHOUSE_ID: ${{ secrets.DATABRICKS_WAREHOUSE_ID }}
      DATABRICKS_OAUTH_ACCESS_TOKEN: ${{ secrets.DATABRICKS_OAUTH_ACCESS_TOKEN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      WANDB_API_KEY: ${{ secrets.WANDB_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          cache: true
      - name: Run integration tests # command to run integration tests
        run: pixi run -e dev pytest -m integration
