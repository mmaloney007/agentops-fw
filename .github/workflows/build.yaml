name: Build & Test

on:
  push:
    branches:
      - "*"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Code analysis and format checks
  code_analysis:
    name: Code Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - name: Pixi Enviornment
        uses: prefix-dev/setup-pixi@v0.9.0
        with:
          pixi-version: v0.62.1
          locked: true
          cache: true
          cache-write: ${{ github.event_name == 'push' && github.ref_name == 'main' }}
      - run: echo '✨☠️'
      - name: Ruff Linting
        uses: chartboost/ruff-action@v1
        with:
          args: check
      - name: Ruff Check Code Format
        uses: chartboost/ruff-action@v1
        with:
          args: format