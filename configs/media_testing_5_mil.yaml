logging:
  level: debug

runtime:
  engine: coiled
  coiled:
    software_env: neuralift_c360_prep_test
    n_workers: 6
    worker_vm_types:
      - i7i.8xlarge       # 32 vCPU / 256 GiB / NVMe (best for shuffle+spill)
      # - i4i.8xlarge      # fallback if i7i unavailable
    scheduler_vm_types:
      - m7i.large         # keep scheduler small
      # - m7i.xlarge       # use if scheduler CPU pegs / huge task graphs
    idle_timeout: 2h
    no_client_timeout: 2h
    create_timeout: 15m
    op_timeout: 45m
    env:
      DASK_DATAFRAME__QUERY_PLANNING: "0"

input:
  source: uc_table
  uc_table: staging-media-source.default.media_demo_5m
  columns: null
  id_cols: ["Customer_ID"]
  snapshot:
    enabled: false

# feature_functions:
#   - Partition-wise pandas functions, applied first. Signature: fn(pdf: pd.DataFrame) -> pd.DataFrame.
#   - Format: "module:function". Runs in order, 0..N entries. Side-effect free; no compute/persist.
#   - Example: add age/generation from a birth year column:
#       neuralift_c360_prep.features.birthday:add_age_from_year
feature_functions: []

# kpi_functions:
#   - Runs AFTER feature_functions, BEFORE preprocessing. Supports multiple ZSML definitions.
#   - Each entry:
#       type: zsml
#       source_col: <col>
#       out_col: <optional, defaults to <source_col>_tier>
#       zero_threshold, quantiles, clip_high_quantile, unit, range_style, add_prefix
kpi_functions:
  - type: zsml
    source_col: Total_Spent
    out_col: Total_Spent_Tier
    zero_threshold: 0.0
    quantiles: [0.33, 0.66]
    clip_high_quantile: 0.95
    unit: "$"
    range_style: text
    add_prefix: true

preprocessing:
  rename_to_snake: true
  bool_fix: true
  drop_empty: true
  drop_constant: true
  missing_fill: auto
  # zsml:
  #   enabled: true
  #   source_col: Total_Spent
  #   out_col: Total_Spent_Tier
  #   zero_threshold: 0.0
  #   quantiles: [0.33, 0.66]
  #   clip_high_quantile: 0.95
  #   unit: "$"
  #   range_style: text
  #   add_prefix: true

# drop_columns:
#   - Applied LAST, after preprocessing/renames (snake-case is allowed).
drop_columns:
  - Country
  - State
  - Zip
  - Cancellation_Date
  - Subscription_Start_Date
  - Subscription_End_Date
  - Last_Login_Date

metadata:
  model: gpt-5-nano
  sample_rows: 5000
  max_concurrency: 50
  tags:
    use_approx_unique: false
    id_cols: ["customer_id"]
    kpi_cols:
      - at_risk
      - is_new_customer
      - is_churned
      - is_cycler
      - is_active
      - total_spent_tier
    missing_indicator_cols: []
    extra_tags_all: null
    extra_tags_by_column:
      total_spent_tier:
        value_sum_column: total_spent
        value_sum_unit: USD
        event_sum_column: months_subscribed
        event_sum_unit: months
    max_card: 25
    use_approx_unique: true
  schema_alignment: true
  context: >
    VistaStream is a premium streaming platform dedicated to delivering an exceptional
    entertainment experience to a diverse and discerning subscriber base.
  op_timeout: 45m

output:
  uc_catalog: staging-c360
  uc_schema: media
  uc_volume_name: media_demo_5m_512mb
  run_name: media_demo_5m_512mb
  uc_table: media_demo_5m_512mb
  # s3_base: s3://dummy-bucket/media_dask_test_54k/
  partitions: []
  target_mb_per_part: 512
