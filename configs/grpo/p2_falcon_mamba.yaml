config_version: "0.2.0"
config_preset: "p2-falcon-mamba-7b"
base_model: "tiiuae/falcon-mamba-7b-instruct"
tasks: "tasks/robust_eval_gold.jsonl"
out: ""
steps: 500
max_prompt_len: 1024
max_new_tokens: 192
temperature: 0.7
top_p: 0.95
lr: 1.0e-5
weight_decay: 0.01
gradient_accumulation: 2
max_grad_norm: 1.0
lora_rank: 16
lora_alpha: 32
lora_dropout: 0.05
lora_targets: "in_proj,x_proj,dt_proj,out_proj"
load_in_4bit: true
torch_dtype: "bfloat16"
eval_interval: 50
deterministic: false
force_json_fallback: false
lam_latency: 0.1
mu_cost: 0.05
gamma_stability: 0.1
seed: 42
repro: true
cache_dataset: true
cache_dir: "out/cache"
checkpoint_every: 250
resume_from: null
no_silent_defaults: false
expected_dataset_hash: null
allow_dataset_drift: true
