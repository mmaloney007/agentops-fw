config_version: "0.1.0"
config_preset: "p6-mlx-mistral-7b"
base_model: "mlx-community/Mistral-7B-Instruct-v0.3-4bit"

# GRPO
group_size: 4
beta: 0.1

# Optimiser
learning_rate: 1.0e-5
num_steps: 1000

# LoRA
lora_rank: 8
lora_layers: 16

# Memory (7B model - enable grad checkpoint)
grad_checkpoint: true

# Generation
max_tokens: 256
batch_size: 1
temperature: 0.7
top_p: 0.95

# Tasks (T-Suite T1-T6)
tasks:
  - "tasks/clinc_en.jsonl"
  - "tasks/hotpot_dev.jsonl"
  - "tasks/t3_tools.jsonl"
  - "tasks/t4_bfcl.jsonl"
  - "tasks/t5_swebench.jsonl"
  - "tasks/public_gsm8k.jsonl"

# Reproducibility
seed: 42

# Reward weights
lam_latency: 0.1
mu_cost: 0.01

# Logging / checkpointing
checkpoint_every: 100
eval_interval: 50
