config_version: "0.1.0"
config_preset: "p5-mlx-qwen3.5-35b-a3b"
base_model: "mlx-community/Qwen3.5-35B-A3B-4bit"

# GRPO — smaller group for memory headroom on 64GB M2 Max
group_size: 2
beta: 0.1

# Optimiser
learning_rate: 1.0e-5
num_steps: 1000

# LoRA — fewer layers to fit 35B model in memory
# 35B-A3B at 4-bit ≈ 18-20GB model weights
# LoRA on 8 layers keeps training footprint under ~28GB total
lora_rank: 8
lora_layers: 8

# Memory (35B MoE — aggressive memory management required)
grad_checkpoint: true

# Generation — shorter max_tokens to reduce peak memory during generation
max_tokens: 192
batch_size: 1
temperature: 0.7
top_p: 0.95

# Tasks (T-Suite T1-T6)
tasks:
  - "tasks/clinc_en.jsonl"
  - "tasks/hotpot_dev.jsonl"
  - "tasks/t3_tools.jsonl"
  - "tasks/t4_bfcl.jsonl"
  - "tasks/t5_swebench.jsonl"
  - "tasks/public_gsm8k.jsonl"

# Reproducibility
seed: 42

# Reward weights
lam_latency: 0.1
mu_cost: 0.01

# Logging / checkpointing — checkpoint more often for expensive model
checkpoint_every: 50
eval_interval: 25
