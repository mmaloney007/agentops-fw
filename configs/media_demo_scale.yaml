# =============================================================================
# MEDIA DEMO SCALE - Coiled Cloud Config (Demo)
# =============================================================================
# Input:  Unity Catalog table (staging-media-source.default.*)
# Output: Unity Catalog (staging-c360.media.*)
# Engine: Coiled (4 workers, m5.2xlarge)
#
# Tests:  ZSML KPI tiering for demo purposes. Configured for customer demos
#         with pre-processed snake_case column names.
# =============================================================================

logging:
  level: debug

runtime:
  engine: coiled
  coiled:
    software_env: neuralift_c360_prep_pr-5
    n_workers: 8
    worker_vm_types: [i3.2xlarge]
    scheduler_vm_types: [c5d.xlarge]
    idle_timeout: 2h
    no_client_timeout: 2h
    create_timeout: 15m
    op_timeout: 45m

input:
  source: uc_table
  uc_table: staging-c360.media.viva_stream_media_27m
  columns: null
ids:
  columns: ["customer_id"]
  auto_detect: true
  # ---------------------------------------------------------------------------
  # LLM-Enhanced ID Detection (optional, disabled by default)
  # ---------------------------------------------------------------------------
  # detection:
  #   llm_enabled: false           # Set to true to enable LLM semantic analysis
  #   llm_provider:
  #     provider: auto             # Options: openai, anthropic, auto
  #     model: null                # Use provider default or specify: gpt-4o-mini
  #   max_llm_columns: 20          # Limit columns sent to LLM (cost control)
  #   llm_cache_enabled: true      # Cache LLM responses to save cost
  #   uniqueness_threshold: 0.95   # Ratio to consider column unique
  #   gray_zone_lower: 0.80        # Lower bound for ambiguous uniqueness
  #   detect_uuid_format: true     # Enable UUID/GUID pattern detection

functions:
  - type: zsml
    source_col: total_spent
    out_col: total_spent_tier
    zero_threshold: 0.0
    quantiles: [0.33, 0.66]
    clip_high_quantile: 0.95
    unit: "$"
    range_style: text
    add_prefix: true
    kpi: true

preprocessing:
  rename_to_snake: true
  bool_fix: true
  drop_empty: true
  drop_constant: true
  fill:
    categorical: "Unknown"
    continuous: "median"

# drop_columns:
#   - Applied LAST, after preprocessing/renames (snake-case is allowed).
drop_columns:
  - state
  - zipcode
  - cancellation_date
  - subscription_start_date
  - subscription_end_date
  - last_login_date

metadata:
  model: gpt-5-nano
  sample_rows: 5000
  max_concurrency: 50
  tags:
    id_cols: ["customer_id"]
    kpi_cols:
      - at_risk
      - is_new_customer
      - is_churned
      - is_cycler
      - is_active
      - total_spent_tier
    missing_indicator_cols: []
    extra_tags_all: null
    extra_tags_by_column:
      total_spent_tier:
        value_sum_column: total_spent
        value_sum_unit: USD
        event_sum_column: months_subscribed
        event_sum_unit: months
    max_card: 20
    use_approx_unique: false
  schema_alignment: true
  context: >
    VistaStream is a premium streaming platform dedicated to delivering an exceptional
    entertainment experience to a diverse and discerning subscriber base.
    In this table each row captures a unique subscriber and includes identifiers, plan details,
    billing histories, churn markers and demographic attributes. It also holds device usage flags,
    genre engagement indicators and viewing statistics expressed as counts, durations and spend totals.
    Columns use text codes, numeric fields, boolean flags and date values.
    Date fields span from the earliest subscription start dates through cancellation entries
    (active accounts marked by a future placeholder date).
  op_timeout: 45m

# -----------------------------------------------------------------------------
# Data Doctor - Automated data quality analysis and suggestions
# -----------------------------------------------------------------------------
# Runs after metadata generation to provide actionable improvement suggestions.
# Rule-based analysis is always on. LLM enhancement is optional.
# -----------------------------------------------------------------------------
data_doctor:
  enabled: true                    # Run Data Doctor analysis (rule-based)
  save_yaml: true                  # Save suggestions.yaml alongside output
  # ---------------------------------------------------------------------------
  # LLM Enhancement (optional, disabled by default)
  # ---------------------------------------------------------------------------
  # llm_enabled: false             # Set to true to enable LLM analysis
  # llm_provider:
  #   provider: auto               # Options: openai, anthropic, auto
  #   model: null                  # Use provider default or specify: gpt-4o-mini
  # max_llm_columns: null          # Limit columns sent to LLM (null = all)
  # llm_cache_enabled: true        # Cache LLM responses to save cost
  # generate_executive_summary: true  # Generate natural language summary

output:
  uc_catalog: staging-c360
  uc_schema: media
  uc_table: vivastream_media_27m_01
  uc_volume_name: vivastream_27m_01
  run_name: vivastream_27m_01
  # s3_base: s3://dummy-bucket/media_dask_test_54k/
  partitions: []
  target_mb_per_part: 256
