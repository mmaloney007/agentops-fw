# configs/criteria/p1_core_public_v2.yaml
#
# Paper 1 (P1) criteria: contract-first, service-level-objective-aware evaluation
# across structure, task accuracy, faithfulness, tools/trajectory, stability, and latency.
#
# Public lineage (read-more sources):
# - Tail latency / service-level objectives: https://cacm.acm.org/research/the-tail-at-scale/
# - Retrieval-Augmented Generation Assessment (RAGAS): https://arxiv.org/abs/2309.15217
# - OpenAI structured outputs concept: https://openai.com/index/introducing-structured-outputs-in-the-api/
# - OpenAI-compatible local tools (LM Studio): https://lmstudio.ai/docs/developer/openai-compat/tools
# - Grammar constraints (llama.cpp grammars): https://github.com/ggml-org/llama.cpp/blob/master/grammars/README.md
# - Outlines structured decoding: https://dottxt-ai.github.io/outlines/
# - LLM stability / non-determinism analysis (for stability framing): https://arxiv.org/abs/2408.04667
#
# NOTE: This file is intentionally drop-in compatible with the v0 threshold layout,
# but adds judge config, weights, tiers, and reproducibility protocol.

schema_version: "1.1"
criteria_id: "p1_core_public_v2"

description: |
  Contract-first evaluation criteria for open-weight agent models served via OpenAI-compatible endpoints.
  This criteria file is designed to be:
    (1) publishable (explicit definitions, thresholds, reporting protocol),
    (2) reproducible (versioned tasks/schemas, stable judge config),
    (3) composable (scales into Papers 2-6 without changing semantics).

# Optional documentation fields (not required by the evaluator).
documentation:
  intended_papers:
    - "P1: SpecSLOEval baseline (static evaluation, no weight training required)."
    - "P2: Uses these same metrics as reward and constraint signals for reinforcement learning."
  typical_endpoints:
    - "Policy endpoint (Mac LM Studio): http://localhost:1234/v1"
    - "Policy endpoint (network LM Studio): http://10.0.0.72:1234/v1"
  typical_models:
    - "qwen/* (policy models)"
    - "openai/gpt-oss-20b (good candidate judge model)"

# Suites define what tasks run. P3 later can add more suites without changing the evaluator core.
suites:
  p1_core:
    tasks:
      - id: "t1_clinc"
        family: "accuracy"
        task_file: "tasks/clinc_en.jsonl"
        output_schema: "tasks/schemas/clinc_nlu_schema.json"

      - id: "t2_hotpot"
        family: "faithfulness"
        task_file: "tasks/hotpot_dev.jsonl"
        output_schema: "tasks/schemas/hotpot_explainer_schema.json"

      - id: "t3_tools"
        family: "tools"
        task_file: "tasks/t3_tools.jsonl"
        output_schema: "tasks/schemas/t3_tool_call_schema.json"

# Lexicographic gating: earlier families must pass before later families are considered.
gating:
  order:
    - "structure"
    - "accuracy"
    - "faithfulness"
    - "tools"
    - "stability"
    - "slo"
  policy: "strict"

# -----------------------
# Judge configuration
# -----------------------
# The judge model is used for faithfulness metrics that require an evaluator model.
# Strong recommendation for credibility:
# - Set temperature to 0.0 for determinism.
# - Use a judge model that is NOT the policy model under evaluation (reduces evaluator coupling).
judge:
  enabled: true

  # OpenAI-compatible judge endpoint. You mentioned openai/gpt-oss-20b at 10.0.0.72:1234.
  base_url: "http://10.0.0.72:1234/v1"
  model: "openai/gpt-oss-20b"

  # Determinism controls.
  temperature: 0.0
  top_p: 1.0

  # Tokens for judge outputs. Keep bounded and stable.
  max_tokens_out: 512

  # Prompt versioning for reproducibility.
  prompt_version: "faithfulness_atomic_v1"

  # If you add a second judge later (for sensitivity checks), wire it here.
  secondary_judge:
    enabled: false
    base_url: "http://localhost:1234/v1"
    model: "qwen/qwen3-4b"
    temperature: 0.0
    max_tokens_out: 512

# -----------------------
# Thresholds by family
# -----------------------
# IMPORTANT: Keep these simple threshold keys for backward compatibility.
# Your evaluator can also implement richer per-metric logic while still using these as family gates.

structure:
  # JSON validity rate: fraction of episodes whose output parses as JSON.
  json_valid_min: 0.99

  # Schema validity rate: fraction of episodes that satisfy JSON Schema exactly.
  schema_valid_min: 0.98

  # Optional: bounded retries / repairs. These improve reliability but can hide failures if unchecked.
  # If your evaluator does not track these yet, it can ignore them safely.
  validation_retry_rate_max: 0.05
  output_repair_rate_max: 0.02

accuracy:
  # T1: CLINC intent classification quality.
  clinc_intent_macro_f1_min: 0.85
  clinc_intent_accuracy_min: 0.85

  # T2: HotpotQA answer quality.
  hotpot_answer_exact_match_min: 0.65
  hotpot_answer_f1_min: 0.75

  # Optional (disabled until schema includes a confidence field):
  # expected_calibration_error is a calibration metric (lower is better).
  # Enable only after you add a confidence number field to the T1 schema.
  calibration:
    enabled: false
    expected_calibration_error_max: 0.10
    confidence_field: "confidence"

faithfulness:
  # Judge-based faithfulness score normalized to [0, 1]. Higher is better.
  hotpot_faithfulness_min: 0.80

  # Contradiction rate: fraction of atomic statements judged to contradict context. Lower is better.
  hotpot_contradiction_rate_max: 0.05

  # Optional: judge-based answer relevancy (normalized [0, 1]).
  # Enable once implemented; it strengthens lineage to Retrieval-Augmented Generation Assessment style decomposition.
  answer_relevancy:
    enabled: false
    hotpot_answer_relevancy_min: 0.80

  # Optional: context precision / context recall (objective if you require an evidence field in model output).
  # Enable once you add an evidence field to the Hotpot schema (for example paragraph identifiers).
  context_quality:
    enabled: false
    context_precision_min: 0.60
    context_recall_min: 0.70
    evidence_field: "evidence"

tools:
  # Tool success rate: fraction of tool calls that succeed (valid arguments AND non-error response).
  tool_success_rate_min: 0.90

  # Optional: enforce tool argument schema validity separately.
  tool_argument_schema_valid_rate_min: 0.98

  # Optional: cap tool-call explosion (helps tail latency).
  tool_calls_p95_max: 4

stability:
  # Stability is measured by repeating the same input multiple times under fixed config.
  # disagreement is the fraction of prompts where outputs are not equivalent across repeated runs.
  disagreement_max: 0.10

  # How many repeated runs per prompt for stability measurement.
  runs_per_prompt: 5

  # Equivalence definition: canonical_json means normalized JSON comparison (sorted keys, stable formatting).
  equivalence: "canonical_json"

slo:
  # Service-level objectives: define tail latency budgets in milliseconds.
  # p95_ms: 95th percentile latency (ms); p99_ms: 99th percentile latency (ms).
  p95_ms_max: 1200
  p99_ms_max: 2000

  # Output token budget for the policy model (not the judge).
  max_tokens_out: 512

  # Hard timeout per episode (ms). Anything beyond this is a failure.
  hard_timeout_ms: 5000

  # Success under service-level objectives: fraction of episodes that pass required quality gates AND are on time.
  # IMPORTANT: This is episode-level success under a fixed per-episode latency budget (for example <= hard_timeout_ms
  # or <= p95 budget), not the same thing as distribution-level p95 compliance.
  success_at_slo_min: 0.75

  # Define the per-episode on-time budget used for success_at_slo.
  # Recommended: set this to p95 budget for interactive workloads, or hard_timeout_ms for batch.
  on_time_budget_ms: 1200

# -----------------------
# Weights for composite scoring
# -----------------------
# Composite score is useful for ranking configs and becomes reward shaping in P2.
# Lexicographic gating still applies; weights do NOT allow later families to compensate for earlier failures.
weights:
  structure:
    json_valid: 0.12
    schema_valid: 0.12
  accuracy:
    clinc_intent_macro_f1: 0.14
    clinc_intent_accuracy: 0.04
    hotpot_answer_exact_match: 0.08
    hotpot_answer_f1: 0.08
  faithfulness:
    hotpot_faithfulness: 0.10
    hotpot_contradiction_rate: 0.05
  tools:
    tool_success_rate: 0.06
    tool_argument_schema_valid_rate: 0.04
  stability:
    disagreement: 0.05
  slo:
    success_at_slo: 0.12
    p95_latency_penalty: 0.02
    p99_latency_penalty: 0.02

# -----------------------
# Tiers (P6-ready) - makes promotion rules and standard levels easy later
# -----------------------
tiers:
  bronze:
    description: "Basic production readiness for structured systems."
    must_pass:
      - "structure.json_valid_min"
      - "structure.schema_valid_min"
      - "slo.p95_ms_max"

  silver:
    description: "Adds semantic correctness and groundedness expectations."
    extends: "bronze"
    must_pass:
      - "accuracy.clinc_intent_macro_f1_min"
      - "accuracy.hotpot_answer_f1_min"
      - "faithfulness.hotpot_faithfulness_min"
      - "stability.disagreement_max"

  gold:
    description: "Adds robust tool use and end-to-end success under service-level objectives."
    extends: "silver"
    must_pass:
      - "tools.tool_success_rate_min"
      - "slo.success_at_slo_min"

# -----------------------
# Reporting and reproducibility protocol (critical for arXiv credibility)
# -----------------------
reporting:
  wandb:
    # You requested all experiments online.
    mode: "online"

    # Set these to your actual values if you want hard enforcement.
    # If left blank/null, W&B uses environment defaults.
    entity: null
    project: "specsloeval"
    group: "p1"

    # Strongly recommended tags for searchability.
    tags:
      - "p1"
      - "criteria_public_v2"
      - "contract_first"
      - "service_level_objectives"
      - "structured_outputs"

    # Artifact lineage makes results auditable.
    log_artifacts: true
    log_episode_table: true
    artifact_alias: "latest"

reproducibility:
  # Warm-up requests to avoid cold-start effects contaminating tail latency.
  warmup_requests: 20

  # Recommend minimum sample size for reliable p99 estimates.
  # If you report p99, aim for at least 1000 evaluated episodes in the relevant workload.
  min_episodes_for_p99_reporting: 1000

  # If you compute confidence intervals, bootstrap settings go here.
  bootstrap:
    enabled: true
    resamples: 1000
    confidence_level: 0.95

notes: |
  Lexicographic gating is enforced: structure -> accuracy -> faithfulness -> tools -> stability -> service-level objectives.
  Later metrics do not compensate for earlier failures. Composite weights are for ranking and RL reward shaping only.
  Success under service-level objectives (success_at_slo) is defined as:
    (passes required quality gates) AND (episode latency <= on_time_budget_ms).
  Service-level objective compliance at p95/p99 is reported separately as distribution-level measurements.
