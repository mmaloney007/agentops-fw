logging:
  level: debug
  show_progress: true

runtime:
  engine: coiled
  coiled:
    software_env: neuralift_c360_prep_pr-4
    n_workers: 4
    # worker_cpu: 8
    # worker_memory: 32GiB
    worker_vm_types: [m5.2xlarge]
    scheduler_vm_types: [c5d.xlarge]
    idle_timeout: 2h
    no_client_timeout: 2h
    create_timeout: 15m
    op_timeout: 45m

input:
  source: uc_table
  uc_table: staging-media-source.default.media_54
  columns: null
ids:
  columns: ["Customer_ID"]
  auto_detect: true

functions:
  - type: zsml
    source_col: Total_Spent
    out_col: Total_Spent_Tier
    zero_threshold: 0.0
    quantiles: [0.33, 0.66]
    clip_high_quantile: 0.95
    unit: "$"
    range_style: text
    add_prefix: true
    kpi: true

preprocessing:
  rename_to_snake: true
  bool_fix: true
  drop_empty: true
  drop_constant: true
  fill:
    categorical: "Unknown"
    continuous: "median"
  # zsml:
  #   enabled: true
  #   source_col: Total_Spent
  #   out_col: Total_Spent_Tier
  #   zero_threshold: 0.0
  #   quantiles: [0.33, 0.66]
  #   clip_high_quantile: 0.95
  #   unit: "$"
  #   range_style: text
  #   add_prefix: true

# drop_columns:
#   - Applied LAST, after preprocessing/renames (snake-case is allowed).
drop_columns:
  - Country
  - State
  - Zip
  - Phone
  - Email
  - Full_Name
  - Google_Advertising_ID
  - Identifier_For_Advertisers
  - Street
  - City
  - Cancellation_Date
  - Subscription_Start_Date
  - Subscription_End_Date
  - Last_Login_Date

metadata:
  model: gpt-5-nano
  sample_rows: 5000
  max_concurrency: 25
  tags:
    id_cols: ["customer_id"]
    kpi_cols:
      - at_risk
      - is_new_customer
      - is_churned
      - is_cycler
      - is_active
      - total_spent_tier
    missing_indicator_cols: []
    extra_tags_all: null
    extra_tags_by_column:
      total_spent_tier:
        value_sum_column: total_spent
        value_sum_unit: USD
        event_sum_column: months_subscribed
        event_sum_unit: months
    max_card: 25
    use_approx_unique: true
  schema_alignment: true
  context: >
    VistaStream is a premium streaming platform dedicated to delivering an exceptional
    entertainment experience to a diverse and discerning subscriber base.
  op_timeout: 45m

output:
  uc_catalog: staging-c360
  uc_schema: media
  uc_volume_name: media_dask_test_54k
  run_name: media_small_test_01
  # s3_base: s3://dummy-bucket/media_dask_test_54k/
  partitions: []
  target_mb_per_part: 512
