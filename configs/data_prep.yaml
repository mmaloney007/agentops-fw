logging:
  level: info
  show_progress: true

runtime:
  engine: local

input:
  source: parquet
  parquet_path: ./example-data/wine_cheese.parquet
  columns: null
  id_cols: ["ID"]
  snapshot:
    enabled: false
    repartition_target: null

feature_functions:
  - neuralift_c360_prep.features.birthday:add_age_from_year

kpi_functions: []

preprocessing:
  rename_to_snake: true
  bool_fix: true
  drop_empty: true
  drop_constant: true
  missing_fill: auto
  zsml:
    enabled: false
    source_col: null
    out_col: null
    zero_threshold: 0.0
    quantiles: [0.33, 0.66]
    clip_high_quantile: 0.95
    unit: ""
    range_style: text
    add_prefix: true

drop_columns:
  - CustomerJoinDate

metadata:
  model: gpt-5-nano
  sample_rows: 5000
  max_concurrency: 15
  tags:
    id_cols: ["ID"]
    kpi_cols:
      - purchases
      - revenue
      - most_recent_purchase
      - customer_complained_recently
    missing_indicator_cols: []
    extra_tags_all: null
    extra_tags_by_column: {}
    max_card: 25
    use_approx_unique: true
  schema_alignment: true
  context: "Local wine/cheese parquet demo"
  op_timeout: 45m

output:
  uc_catalog: staging-c360
  uc_schema: kaggle-marketing
  uc_table: wine_cheese_local
  s3_base: local-output
  partitions: []
  target_mb_per_part: 512
  force_npartitions: null
