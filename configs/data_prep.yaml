### MAKE THIS A LOCAL OUTPUT CLUSTER SPOT TEST IT

logging:
  level: info
  show_progress: true

runtime:
  engine: local
  coiled:
    name: neuralift_c360_prep
    software_env: neuralift_c360_prep
    n_workers: 4
    worker_cpu: 8
    worker_memory: 32GiB
    idle_timeout: 2h
    no_client_timeout: 2h
    create_timeout: 15m
    op_timeout: 45m
    env: {}

input:
  source: csv
  csv_path: ./tests/fixtures/wine/wine.csv
  columns: null
  id_cols: ["id"]
  snapshot:
    enabled: false
    repartition_target: null

# feature_functions:
#   - Partition-wise pandas functions, applied first. Signature: fn(pdf: pd.DataFrame) -> pd.DataFrame.
#   - Format: "module:function". Runs in order, 0..N entries. Side-effect free; no compute/persist.
#   - Example: add age/generation from a birth year column:
#       neuralift_c360_prep.features.birthday:add_age_from_year
feature_functions:
  - neuralift_c360_prep.features.birthday:add_birth_month
  - neuralift_c360_prep.features.map_state_and_region:map_state_and_region

# kpi_functions:
#   - Runs AFTER feature_functions, BEFORE preprocessing. Supports multiple ZSML definitions.
#   - Each entry:
#       type: zsml
#       source_col: <col>
#       out_col: <optional, defaults to <source_col>_tier>
#       zero_threshold, quantiles, clip_high_quantile, unit, range_style, add_prefix
# feature_functions:
#   - Partition-wise pandas functions, applied first. Signature: fn(pdf: pd.DataFrame) -> pd.DataFrame.
#   - Format: "module:function". Runs in order, 0..N entries. Side-effect free; no compute/persist.
#   - Example: add age/generation from a birth year column:
#       neuralift_c360_prep.features.birthday:add_age_from_year
feature_functions: []

# kpi_functions:
#   - Runs AFTER feature_functions, BEFORE preprocessing. Supports multiple ZSML definitions.
#   - Each entry:
#       type: zsml
#       source_col: <col>
#       out_col: <optional, defaults to <source_col>_tier>
#       zero_threshold, quantiles, clip_high_quantile, unit, range_style, add_prefix
kpi_functions:
  - type: zsml
    source_col: total_spent
    out_col: total_spent_tier
    zero_threshold: 0.0
    quantiles: [0.33, 0.66]
    clip_high_quantile: 0.95
    unit: "$"
    range_style: text
    add_prefix: true
    tag: kpi
    # lift_potential:
      value_sum_column: total_spent
      value_sum_unit: USD
      event_sum_column: months_subscribed
      event_sum_unit: months
  - type: idenity


preprocessing:
  rename_to_snake: true
  bool_fix: true
  drop_empty: true
  drop_constant: true
  missing_fill: auto
  zsml:
    enabled: false
    source_col: null
    out_col: null
    zero_threshold: 0.0
    quantiles: [0.33, 0.66]
    clip_high_quantile: 0.95
    unit: ""
    range_style: text
    add_prefix: true

# drop_columns:
#   - Applied LAST, after preprocessing/renames (snake-case is allowed).
drop_columns: []

metadata:
  model: gpt-5-nano
  sample_rows: 5000
  max_concurrency: 15
  tags:
    id_cols: ["id"]
    kpi_cols: [] # ADD THIS TO MATCH WINE AND CHEESE
    missing_indicator_cols: []
    extra_tags_all: null
    extra_tags_by_column: {}
    max_card: 25
    use_approx_unique: true
  schema_alignment: true
  context: "Demo run"
  op_timeout: 45m

output:
  uc_catalog: staging-c360
  uc_schema: kaggle-marketing
  uc_table: demo_table
  s3_base: s3://dummy-bucket/demo/
  partitions: ["id"]
  target_mb_per_part: 512
  force_npartitions: null
