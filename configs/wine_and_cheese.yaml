# =============================================================================
# WINE AND CHEESE - Coiled Cloud Config
# =============================================================================
# Input:  Unity Catalog table (staging-c360.kaggle-marketing.wine_cheese_*)
# Output: Unity Catalog (staging-c360.kaggle-marketing.wine_demo)
# Engine: Coiled (2 workers, m4.xlarge)
#
# Tests:  Full function suite with KPIs and lift metadata. Primary test config
#         for validating the unified functions format with real cloud data.
# =============================================================================

logging:
  level: info
  show_progress: true

runtime:
  engine: coiled
  coiled:
    software_env: neuralift_c360_prep_pr-5
    n_workers: 2
    # worker_cpu: 4
    # worker_memory: 16GiB
    worker_vm_types: [m4.xlarge]
    scheduler_vm_types: [c5d.xlarge]
    idle_timeout: 2h
    no_client_timeout: 2h
    create_timeout: 15m
    op_timeout: 45m

input:
  source: uc_table
  uc_table: staging-c360.kaggle-marketing.wine_cheese_20250624_01
  columns: null
ids:
  columns: ["id"]
  auto_detect: false
  # ---------------------------------------------------------------------------
  # LLM-Enhanced ID Detection (disabled for Coiled runs)
  # ---------------------------------------------------------------------------
  # detection:
  #   llm_enabled: false           # Set to true to enable LLM semantic analysis
  #   llm_provider:
  #     provider: auto             # Options: openai, anthropic, auto
  #   max_llm_columns: 20          # Limit columns sent to LLM (cost control)
  #   llm_cache_enabled: true      # Cache LLM responses to save cost

preprocessing:
  rename_to_snake: true
  bool_fix: true
  drop_empty: true
  drop_constant: true
  fill:
    categorical: "Unknown"
    continuous: "median"

functions:
  # KPI functions (kpi: true marks output as KPI)
  - type: zsml
    source_col: Revenue
    out_col: revenue_tier
    quantiles: [0.33, 0.66]
    kpi: true
    lift:
      value_sum_column: Revenue
      value_sum_unit: USD
      event_sum_column: Purchases
      event_sum_unit: events

  - type: identity
    column: CustomerComplainedRecently
    kpi: true

  # Feature engineering functions
  - type: callable
    callable: neuralift_c360_prep.features.birthday:add_age_from_year
    inputs: [Year_Birth]

  - type: binning
    source_col: Age
    out_col: age_bin

  - type: string_normalize
    source_col: Education
    out_col: education_clean

  - type: frequency_encode
    source_col: Marital_Status
    out_col: marital_status_freq
    normalize: true

  - type: days_since
    source_col: CustomerJoinDate
    out_col: days_since_join
    reference_date: "2024-01-01"

  - type: date_parts
    source_col: CustomerJoinDate

  - type: winsorize
    source_col: Income
    lower_quantile: 0.01
    upper_quantile: 0.99

  - type: log_transform
    source_col: AmmountSpentOnWine
    log_method: log1p
    log_clip_min: 0

  - type: categorical_bucket
    source_col: Marital_Status
    top_k: 3
    other_label: other

  - type: ratio
    numerator_col: AmmountSpentOnWine
    denominator_col: Income
    out_col: spend_wine_per_income
    on_zero: zero

drop_columns: []

metadata:
  model: gpt-5-nano
  sample_rows: 5000
  max_concurrency: 75
  context: "Wine and cheese demo"
  op_timeout: 45m

# -----------------------------------------------------------------------------
# Data Doctor - Automated data quality analysis and suggestions
# -----------------------------------------------------------------------------
# Runs after metadata generation to provide actionable improvement suggestions.
# Rule-based analysis is always on. LLM enhancement is optional.
# -----------------------------------------------------------------------------
data_doctor:
  enabled: true                    # Run Data Doctor analysis (rule-based)
  save_yaml: true                  # Save suggestions.yaml alongside output
  # ---------------------------------------------------------------------------
  # LLM Enhancement (enabled for testing)
  # ---------------------------------------------------------------------------
  llm_enabled: true                # LLM analysis enabled
  llm_provider:
    provider: auto                 # Options: openai, anthropic, auto
  llm_cache_enabled: true          # Cache LLM responses to save cost
  generate_executive_summary: true # Generate natural language summary

output:
  uc_catalog: staging-c360
  uc_schema: kaggle-marketing
  uc_volume_name: wine_demo
  uc_table: wine_demo
  run_name: wine_cheese_test
  # s3_base: local-output
  partitions: []
  target_mb_per_part: 512
