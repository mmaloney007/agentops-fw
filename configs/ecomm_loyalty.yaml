# =============================================================================
# ECOMM LOYALTY - Coiled Cloud Config
# =============================================================================
# Input:  Unity Catalog table (staging-ecomm-loyalty.default.*)
# Output: Unity Catalog (staging-c360.ecomm-loyalty.*)
# Engine: Coiled (4 workers, m5.2xlarge)
#
# Tests:  Preprocessing only (no functions). Tests ingestion and metadata
#         generation for loyalty program data with rewards/points tracking.
# =============================================================================

logging:
  level: debug
  show_progress: true

runtime:
  engine: coiled
  coiled:
    software_env: neuralift_c360_prep
    n_workers: 6
    worker_vm_types:
      - i3.2xlarge #- i3.2xlarge
    scheduler_vm_types:
      - c5d.xlarge
    idle_timeout: 2h
    no_client_timeout: 2h
    create_timeout: 15m
    op_timeout: 45m

input:
  source: uc_table
  uc_table: staging-ecomm-clothing-source.default.ecomm_loyalty_lp
  columns: null
ids:
  columns: ["customer_id"]
  auto_detect: true

functions: []

preprocessing:
  rename_to_snake: true
  bool_fix: true
  drop_empty: true
  drop_constant: true
  fill:
    categorical: "Unknown"
    continuous: "median"
  # zsml:
  #   enabled: false
  #   source_col: null
  #   out_col: null
  #   zero_threshold: 0.0
  #   quantiles: [0.33, 0.66]
  #   clip_high_quantile: 0.95
  #   unit: ""
  #   range_style: text
  #   add_prefix: true

# drop_columns:
#   - Applied LAST, after preprocessing/renames (snake-case is allowed).
# drop_columns:
#   - CustomerJoinDate

metadata:
  model: gpt-5-nano
  sample_rows: 5000
  max_concurrency: 25
  tags:
    id_cols: ["customer_id"]
    kpi_cols:
      - increased_spending_yoy
      - returns_20_pct
      - sales_20_pct
      - is_loyal_customer
      - loyalty_program_tier
      - average_net_order_spend
    missing_indicator_cols: []
    extra_tags_all: null
    extra_tags_by_column:
      average_net_order_spend:
        value_sum_column: total_spend_net_returns_last_3_years
        value_sum_unit: USD
        event_sum_column: total_transactions_last_3_years
        event_sum_unit: order
    max_card: 25
    use_approx_unique: true
  schema_alignment: true
  context: |
    Willow & Birch is a nationally recognized, upscale women's apparel and lifestyle brand, dedicated to serving the needs of modern, discerning women through an direct to consumer retail model.
    Offering a cross category selection across multiple styles from casual to work to formal Willow & Birch has established itself as a trusted destination for apparel and lifestyle essentials throughout
    their adult lives and style.
  op_timeout: 45m

output:
  uc_catalog: staging-c360
  uc_schema: ecomm-clothing
  uc_volume_name: loyalty_demo_lp
  uc_table: loyalty_demo_lp
  run_name: loyalty_demo_lp
  # s3_base: s3://dummy-bucket/wine/
  partitions: []
  target_mb_per_part: 512
