backend: mlx
run_name: mlx_local_reasoner_rl
out_dir: ../../out/reasoning_stack
seed: 17

tokenizer_name: gpt2
pretrain_text_files:
  - ../../tasks/t1t5_natural.jsonl
reasoning_task_files:
  - ../../tasks/robust_eval_gold.jsonl
eval_task_files:
  - ../../tasks/robust_eval_gold.jsonl

max_reasoning_examples: 4000
max_eval_examples: 500

sequence_length: 256
micro_batch_size: 4
grad_accum_steps: 2
learning_rate: 0.0002
weight_decay: 0.1
warmup_steps: 50
pretrain_steps: 800
reasoning_steps: 600
log_every: 25

enable_rl_stage: true
rl_steps: 400
rl_group_size: 4
rl_max_new_tokens: 96
rl_temperature: 0.7
rl_top_p: 0.95
rl_log_every: 20
lam_latency: 0.1
mu_cost: 0.01
gamma_stability: 0.05

model_hidden_size: 512
model_layers: 8
model_heads: 8
model_ffn_mult: 4
model_dropout: 0.1

mlx_base_model: mlx-community/Llama-3.2-1B-Instruct-4bit
mlx_adapter_rank: 16
mlx_lora_layers: 16
mlx_learning_rate: 0.00001
command_timeout_sec: 0

dry_run: true
