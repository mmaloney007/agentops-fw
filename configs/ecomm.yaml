# =============================================================================
# ECOMM - Coiled Cloud Config
# =============================================================================
# Input:  Unity Catalog table (staging-ecomm.default.*)
# Output: Unity Catalog (staging-c360.ecomm.*)
# Engine: Coiled (4 workers, m5.2xlarge)
#
# Tests:  Preprocessing only (no functions). Tests ingestion and metadata
#         generation for e-commerce transaction data.
# =============================================================================

logging:
  level: debug

runtime:
  engine: coiled
  coiled:
    software_env: neuralift_c360_prep_pr-5
    n_workers: 6
    worker_vm_types:
      - i3.2xlarge #- i3.4xlarge
    scheduler_vm_types:
      - c5d.xlarge
    idle_timeout: 2h
    no_client_timeout: 2h
    create_timeout: 15m
    op_timeout: 45m

input:
  source: uc_table
  uc_table: staging-ecomm-clothing-source.default.ecomm_lp
  columns: null
ids:
  columns: ["customer_id"]
  auto_detect: true
  # ---------------------------------------------------------------------------
  # LLM-Enhanced ID Detection (optional, disabled by default)
  # ---------------------------------------------------------------------------
  # detection:
  #   llm_enabled: false           # Set to true to enable LLM semantic analysis
  #   llm_provider:
  #     provider: auto             # Options: openai, anthropic, auto
  #     model: null                # Use provider default or specify: gpt-4o-mini
  #   max_llm_columns: 20          # Limit columns sent to LLM (cost control)
  #   llm_cache_enabled: true      # Cache LLM responses to save cost
  #   uniqueness_threshold: 0.95   # Ratio to consider column unique
  #   gray_zone_lower: 0.80        # Lower bound for ambiguous uniqueness
  #   detect_uuid_format: true     # Enable UUID/GUID pattern detection

functions: []

preprocessing:
  rename_to_snake: true
  bool_fix: true
  drop_empty: true
  drop_constant: true
  fill:
    categorical: "Unknown"
    continuous: "median"
  # zsml:
  #   enabled: false
  #   source_col: null
  #   out_col: null
  #   zero_threshold: 0.0
  #   quantiles: [0.33, 0.66]
  #   clip_high_quantile: 0.95
  #   unit: ""
  #   range_style: text
  #   add_prefix: true

# drop_columns:
#   - Applied LAST, after preprocessing/renames (snake-case is allowed).
# drop_columns:
#   - CustomerJoinDate

metadata:
  model: gpt-5-nano
  sample_rows: 5000
  max_concurrency: 25
  tags:
    id_cols: ["customer_id"]
    kpi_cols:
      - returns_20_pct
      - is_loyal_customer
      - sales_20_pct
      - loyalty_program_tier
      - average_net_order_spend
    missing_indicator_cols: []
    extra_tags_all: null
    extra_tags_by_column:
      average_net_order_spend:
        value_sum_column: total_spend_net_returns_last_3_years
        value_sum_unit: USD
        event_sum_column: total_transactions_last_3_years
        event_sum_unit: order
    max_card: 25
    use_approx_unique: true
  schema_alignment: true
  context: |
    Willow & Birch is a nationally recognized, upscale women's apparel and lifestyle brand, dedicated to serving the needs of modern, discerning women through an direct to consumer retail model.
    Offering a cross category selection across multiple styles from casual to work to formal Willow & Birch has established itself as a trusted destination for apparel and lifestyle essentials throughout
    their adult lives and style.
  op_timeout: 45m

# -----------------------------------------------------------------------------
# Data Doctor - Automated data quality analysis and suggestions
# -----------------------------------------------------------------------------
# Runs after metadata generation to provide actionable improvement suggestions.
# Rule-based analysis is always on. LLM enhancement is optional.
# -----------------------------------------------------------------------------
data_doctor:
  enabled: true                    # Run Data Doctor analysis (rule-based)
  save_yaml: true                  # Save suggestions.yaml alongside output
  # ---------------------------------------------------------------------------
  # LLM Enhancement (optional, disabled by default)
  # ---------------------------------------------------------------------------
  # llm_enabled: false             # Set to true to enable LLM analysis
  # llm_provider:
  #   provider: auto               # Options: openai, anthropic, auto
  #   model: null                  # Use provider default or specify: gpt-4o-mini
  # max_llm_columns: null          # Limit columns sent to LLM (null = all)
  # llm_cache_enabled: true        # Cache LLM responses to save cost
  # generate_executive_summary: true  # Generate natural language summary

output:
  uc_catalog: staging-c360
  uc_schema: ecomm-clothing
  uc_volume_name: ecomm_demo_lp
  uc_table: ecomm_demo_lp
  run_name: ecomm_demo_lp
  # s3_base: s3://dummy-bucket/wine/
  partitions: []
  target_mb_per_part: 512
